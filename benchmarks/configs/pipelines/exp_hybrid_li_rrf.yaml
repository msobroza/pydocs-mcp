# Hybrid BM25 + late-interaction (ColBERT/MaxSim) ranked chunk search —
# benchmark experiment suite. Mirrors the shape of exp_hybrid_rrf_k60
# (BM25 + dense via RRF) but swaps the dense branch for late-interaction
# MaxSim re-ranking. max_results=10 so recall@10 sees a full top-10
# (the shipped *_ranked presets cap at 8).
# Referenced by ../repoqa_hybrid_li_rrf.yaml AND ../ds1000_hybrid_li_rrf.yaml.
#
# Requires the [late-interaction] extra and `late_interaction.enabled: true`
# in the surrounding sweep config (the embedder + FastPlaidUnitOfWork are
# wired by the composition root when that toggle is on).
name: exp_hybrid_li_rrf
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: parallel
    type: parallel_retrieval
    params:
      branches:
        - name: bm25
          steps:
            - name: fetch
              type: chunk_fetcher
              params:
                schema_name: chunk
            - name: score
              type: bm25_scorer
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params:
                publish_to: bm25.ranked
        - name: late
          steps:
            - name: fetch
              type: chunk_fetcher
              params:
                schema_name: chunk
            - name: score
              type: bm25_scorer
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params: {}
            - name: rerank
              type: late_interaction_scorer
              params:
                publish_to: late.ranked
  - name: fuse
    type: rrf_fusion
    params: {}
  - name: limit
    type: limit
    params:
      max_results: 10
