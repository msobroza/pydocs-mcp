# Late-interaction ingestion pipeline.
#
# Drop-in replacement for ``ingestion.yaml`` when
# ``late_interaction.enabled: true`` in the active AppConfig YAML: swaps
# the single-vector ``embed_chunks`` stage for ``embed_chunks_multi_vector``
# so the configured ``MultiVectorEmbedder`` populates ``uow.multi_vectors``
# (the fast-plaid-backed multi-vector store) during indexing. Every other
# stage — file discovery, chunking, reference capture, content-hash
# rewrite + skip set, package_build — is identical to the default
# ingestion preset.
#
# Override via ``extraction.ingestion.pipeline_path`` in your config YAML;
# the loader resolves the path against the shipped pipelines dir or the
# directory next to the config file (path allowlist contract).
name: ingestion_late_interaction
stages:
  - { type: file_discovery }
  - { type: file_read }
  - { type: chunking }
  - { type: reference_capture }
  - { type: flatten }
  - { type: assign_chunk_content_hash }    # rewrites chunk hashes with pipeline_hash slot
  - { type: load_existing_chunk_hashes }   # reads SQLite for the embed-skip set
  - { type: embed_chunks_multi_vector, batch_size: 32 }
  - { type: content_hash }
  - { type: package_build }
