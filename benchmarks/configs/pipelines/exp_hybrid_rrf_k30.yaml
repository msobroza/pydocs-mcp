# Hybrid BM25 + dense, RRF fusion with k=30 — RepoQA experiment suite.
# Lower k weights the very top ranks more aggressively than the literature
# default (k=60). Referenced by ../repoqa_hybrid_rrf_k30.yaml.
name: exp_hybrid_rrf_k30
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: parallel
    type: parallel_retrieval
    params:
      branches:
        - name: bm25
          steps:
            - {name: fetch, type: chunk_fetcher, params: {schema_name: chunk}}
            - {name: score, type: bm25_scorer, params: {}}
            - {name: filter, type: metadata_post_filter, params: {}}
            - {name: topk, type: top_k_filter, params: {publish_to: bm25.ranked}}
        - name: dense
          steps:
            - {name: fetch, type: dense_fetcher, params: {}}
            - {name: filter, type: metadata_post_filter, params: {}}
            - {name: topk, type: top_k_filter, params: {publish_to: dense.ranked}}
  - name: fuse
    type: rrf_fusion
    params:
      k: 30
  - name: dense_rerank
    type: dense_scorer
    params: {}
  - name: limit
    type: limit
    params:
      max_results: 10
