# Vectorless LLM tree-reasoning, ranked output — RepoQA experiment suite.
# The LLM is the only retrieval signal (no BM25, no dense). Requires an LLM
# client (the `llm:` config + OPENAI_API_KEY) at search time. Mirrors the
# shipped tree_only.yaml but drops the token_budget_formatter so the output
# is a ranked candidate list (state.candidates) the recall@k / mrr metrics
# can score. Referenced by ../tree.yaml.
name: exp_tree
steps:
  - name: tree_reasoning
    type: llm_tree_reasoning
    params:
      prompt_template: tree_reasoning_pydocs_v1
      output_scratch_key: candidates_inline
      # Fit gpt-4o-mini's 128K-token window: prune very large repo trees so the
      # sweep degrades gracefully instead of 400-ing on context overflow (e.g.
      # pytorch_geometric's tree is ~300K tokens). Budget is REAL tiktoken
      # tokens now (the old 50K-WORD value was ~170K tokens and overflowed);
      # 96K = 128K * 0.75 leaves headroom for the prompt + response. Omit this
      # to auto-derive from llm.model_name instead.
      max_tree_tokens: 96000
  - name: promote_scratch_to_candidates
    type: rrf_fusion
    params:
      branch_keys: [candidates_inline]
  - name: limit
    type: limit
    params:
      max_results: 10
