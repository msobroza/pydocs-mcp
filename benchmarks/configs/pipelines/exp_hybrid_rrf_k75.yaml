# Hybrid BM25 + dense, RRF fusion with k=75 (between the k=60 and k=100
# samples) — RepoQA experiment suite. Finer sampling of the RRF rank-bias
# curve. Referenced by ../repoqa_hybrid_rrf_k75.yaml.
name: exp_hybrid_rrf_k75
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: parallel
    type: parallel_retrieval
    params:
      branches:
        - name: bm25
          steps:
            - {name: fetch, type: chunk_fetcher, params: {schema_name: chunk}}
            - {name: score, type: bm25_scorer, params: {}}
            - {name: filter, type: metadata_post_filter, params: {}}
            - {name: topk, type: top_k_filter, params: {publish_to: bm25.ranked}}
        - name: dense
          steps:
            - {name: fetch, type: dense_fetcher, params: {}}
            - {name: score, type: dense_scorer, params: {}}
            - {name: filter, type: metadata_post_filter, params: {}}
            - {name: topk, type: top_k_filter, params: {publish_to: dense.ranked}}
  - name: fuse
    type: rrf_fusion
    params:
      k: 75
  - name: limit
    type: limit
    params:
      max_results: 10
