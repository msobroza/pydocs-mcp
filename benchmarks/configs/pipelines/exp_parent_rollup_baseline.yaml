# No-rollup twin of exp_parent_rollup.yaml — identical pipeline minus the
# parent_rollup step, so any metric delta isolates the rollup itself.
name: exp_parent_rollup_baseline
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: fetch
    type: dense_fetcher
    params: {}
  - name: filter
    type: metadata_post_filter
    params: {}
  - name: graph
    type: graph_expand
    params:
      top_s: 10
      max_depth: 1
      decay: 0.9
  - name: centrality
    type: centrality_prior
    params:
      metric: pagerank
      alpha: 0.5
  - name: topk
    type: top_k_filter
    params: {}
  - name: limit
    type: limit
    params:
      max_results: 10
