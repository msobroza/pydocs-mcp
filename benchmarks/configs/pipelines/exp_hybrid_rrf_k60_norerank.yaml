# A/B baseline: hybrid BM25 + dense, RRF fusion k=60, WITHOUT the post-fusion
# dense re-rank step. Identical to exp_hybrid_rrf_k60.yaml minus `dense_rerank`,
# so a 4-vs-13 sweep delta (see benchmarks/EXPERIMENTS.md) isolates the
# turbovec re-ranker. Referenced by ../hybrid_rrf_k60_norerank.yaml.
name: exp_hybrid_rrf_k60_norerank
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: parallel
    type: parallel_retrieval
    params:
      branches:
        - name: bm25
          steps:
            - {name: fetch, type: chunk_fetcher, params: {schema_name: chunk}}
            - {name: score, type: bm25_scorer, params: {}}
            - {name: filter, type: metadata_post_filter, params: {}}
            - {name: topk, type: top_k_filter, params: {publish_to: bm25.ranked}}
        - name: dense
          steps:
            - {name: fetch, type: dense_fetcher, params: {}}
            - {name: filter, type: metadata_post_filter, params: {}}
            - {name: topk, type: top_k_filter, params: {publish_to: dense.ranked}}
  - name: fuse
    type: rrf_fusion
    params:
      k: 60
  - name: limit
    type: limit
    params:
      max_results: 10
