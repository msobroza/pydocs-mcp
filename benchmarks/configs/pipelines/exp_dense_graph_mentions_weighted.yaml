# Dense + reference-graph expansion with MENTIONS traversed at reduced trust.
# Same as exp_dense_graph_mentions.yaml but a mentions-traversed neighbour is
# scaled by kind_weights (regex-fuzzy doc edges are weaker evidence than
# AST-captured CALLS/INHERITS): score = seed_sim * decay**hop * 0.6. Ablation
# pair for the unweighted variant — if unweighted mentions hurts standard
# recall@1 (the centrality failure mode) but helps docs recall, this measures
# whether down-weighting keeps the win without the noise.
# Referenced by ../repoqa_dense_graph_mentions_weighted_f2llm330m.yaml.
name: exp_dense_graph_mentions_weighted
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: fetch
    type: dense_fetcher
    params: {}
  - name: filter
    type: metadata_post_filter
    params: {}
  - name: graph
    type: graph_expand
    params:
      top_s: 10
      max_depth: 1
      decay: 0.9
      kinds: [calls, inherits, mentions]
      kind_weights: {mentions: 0.6}
  - name: topk
    type: top_k_filter
    params: {}
  - name: limit
    type: limit
    params:
      max_results: 10
