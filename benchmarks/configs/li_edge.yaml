# Experiment overlay — single-stage late-interaction (ColBERT/MaxSim) with the
# lightonai/LateOn-Code-edge model (48-dim, doc 2048 / query 256). The
# speed / long-context variant: ~2.7x smaller token vectors than LateOn-Code
# and a far longer context window. Same exp_li pipeline as li.yaml, so
# the delta isolates the model. Switching models triggers a one-time re-index
# (LateInteractionConfig is folded into the ingestion pipeline hash).
#
# Requires the [late-interaction] extra on a Python 3.11/3.12 env.
late_interaction:
  enabled: true
  model_name: lightonai/LateOn-Code-edge
  embedding_dim: 48
  document_length: 2048
  query_length: 256

# Ingestion pipeline is selected here (not via pipelines.ingestion) so the
# multi-vector store is actually populated. See li.yaml.
extraction:
  ingestion:
    pipeline_path: pipelines/ingestion_late_interaction.yaml

pipelines:
  chunk:
    - default: true
      pipeline_path: pipelines/exp_li.yaml
