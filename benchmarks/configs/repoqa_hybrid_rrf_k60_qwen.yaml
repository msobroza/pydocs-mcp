# RepoQA experiment — hybrid BM25 + Qwen3 dense, RRF fusion k=60.
# Swaps the dense branch's embedder to the stronger Qwen3-Embedding-0.6B
# (sentence-transformers / torch) — same hybrid pipeline as
# repoqa_hybrid_rrf_k60.yaml, only the embedder differs. Compare the two to
# isolate the dense-embedder quality effect inside hybrid fusion.
# See benchmarks/EXPERIMENTS.md.
embedding:
  provider: sentence_transformers
  model_name: Qwen/Qwen3-Embedding-0.6B
  dim: 1024
  batch_size: 4

pipelines:
  chunk:
    - default: true
      pipeline_path: pipelines/exp_hybrid_rrf_k60.yaml
