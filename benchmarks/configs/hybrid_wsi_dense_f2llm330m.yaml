# Experiment overlay — hybrid BM25 + F2LLM dense, weighted 0.3 BM25 / 0.7 dense (dense-heavy).
# Dense-leaning linear blend pairs the strong F2LLM dense branch with a BM25
# assist. codefuse-ai/F2LLM-v2-330M (896-dim, code-specialized LLM embedder with
# an ASYMMETRIC built-in query-instruct prompt) served via sentence-transformers
# (torch); same hybrid pipeline as hybrid_wsi_dense.yaml, only the embedder
# differs. Compare against the bge-small hybrid and the pure F2LLM dense
# (dense_f2llm.yaml) to isolate the dense-embedder effect inside fusion.
# See benchmarks/EXPERIMENTS.md.
embedding:
  provider: sentence_transformers
  model_name: codefuse-ai/F2LLM-v2-330M
  dim: 896
  # 330M decoder — lighter than the 0.6B variant. Batch held at 4 for
  # apples-to-apples VRAM behavior with the other dense configs on the
  # 11GB RTX 2080 Ti (peaks well under the 0.6B's ~7.8 GB — headroom to spare).
  batch_size: 4
  # Pin the token cap explicitly (the embedder default is also 2048, but stating
  # it keeps this config reproducible and apples-to-apples with the other 0.6B
  # dense configs instead of relying on the implicit default).
  max_seq_length: 2048

pipelines:
  chunk:
    - default: true
      pipeline_path: pipelines/exp_hybrid_wsi_dense.yaml
