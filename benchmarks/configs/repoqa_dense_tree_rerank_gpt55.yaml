# RepoQA experiment — two-stage DENSE top-200 candidate-gen + LLM
# tree-reasoning rerank scoped to those candidates.
# Identical to repoqa_bm25_tree_rerank_gpt55.yaml EXCEPT stage 1 seeds the
# rerank pool from dense F2LLM-v2-330M retrieval instead of BM25 — the BM25
# gate was the largest recoverable retrieval loss (PAGEINDEX_DIVS.md F4).
# The embedding block matches repoqa_dense_f2llm_330m.yaml (the honest dense
# baseline) so the rerank's delta vs pure dense is directly attributable to
# the LLM stage.
# REQUIRES OPENAI_API_KEY (the tree step calls the LLM per query).
# NOTE: gpt-5.5 only accepts the default temperature; the client omits the
# temperature kwarg for reasoning models (see llm_clients/openai.py), so the
# rerank is mildly non-deterministic. n=30 cannot resolve <~3-needle deltas
# (PAGEINDEX_DIVS.md F7) — validate wins on the 100-needle python test split.
llm:
  model_name: gpt-5.5
embedding:
  provider: sentence_transformers
  model_name: codefuse-ai/F2LLM-v2-330M
  dim: 896
  # Batch held at 4 for apples-to-apples VRAM behavior with the other dense
  # configs on the 11GB RTX 2080 Ti.
  batch_size: 4
  # Pin the token cap explicitly (embedder default is also 2048) so this
  # config stays reproducible and apples-to-apples with the dense baselines.
  max_seq_length: 2048
pipelines:
  chunk:
    - default: true
      pipeline_path: pipelines/exp_dense_tree_rerank.yaml
