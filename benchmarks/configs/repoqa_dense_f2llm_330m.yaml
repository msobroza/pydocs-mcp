# RepoQA experiment — single-stage dense with codefuse-ai/F2LLM-v2-330M
# (896-dim, code-specialized LLM embedder with an ASYMMETRIC built-in
# query-instruct prompt) served via sentence-transformers (torch). Same
# exp_dense pipeline as repoqa_dense.yaml; only the embedder differs. The
# smaller sibling of repoqa_dense_f2llm.yaml (the 0.6B / 1024-dim variant) —
# run both to isolate the model-size effect on dense retrieval quality.
# See benchmarks/EXPERIMENTS.md.
embedding:
  provider: sentence_transformers
  model_name: codefuse-ai/F2LLM-v2-330M
  dim: 896
  # 330M decoder — lighter than the 0.6B variant. Batch held at 4 for
  # apples-to-apples VRAM behavior with the other dense configs on the
  # 11GB RTX 2080 Ti (peaks well under the 0.6B's ~7.8 GB — headroom to spare).
  batch_size: 4
  # Pin the token cap explicitly (the embedder default is also 2048, but stating
  # it keeps this config reproducible and apples-to-apples with the other dense
  # configs instead of relying on the implicit default).
  max_seq_length: 2048

pipelines:
  chunk:
    - default: true
      pipeline_path: pipelines/exp_dense.yaml
