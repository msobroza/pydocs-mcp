# Narrows markdown chunking to the top two heading levels (H1, H2 only) instead
# of the default H1-H3. Expected effect: fewer, larger markdown chunks. Tests
# whether the default H3-grained chunking over-fragments docs-heavy retrieval —
# coarse chunks may improve recall on conceptual queries but hurt precision on
# narrow lookups.
extraction:
  chunking:
    markdown:
      min_heading_level: 1
      max_heading_level: 2
