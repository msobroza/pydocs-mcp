# RepoQA experiment — dense + graph_expand + centrality_prior + parent_rollup
# (kind-aware sibling→parent rollup). Uses the default single-vector embedder
# (`embedding:` -> FastEmbed bge-small). node_scores enabled so
# centrality_prior has PageRank to rank by (needs the `[graph]` extra).
# A/B against repoqa_parent_rollup_baseline.yaml — identical pipeline minus
# the parent_rollup step — to isolate the rollup. See benchmarks/EXPERIMENTS.md.
reference_graph:
  node_scores:
    enabled: true

pipelines:
  chunk:
    - default: true
      pipeline_path: pipelines/exp_parent_rollup.yaml
