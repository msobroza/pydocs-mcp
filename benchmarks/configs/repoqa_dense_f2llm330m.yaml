# RepoQA experiment — dense (embedding) only, codefuse-ai/F2LLM-v2-330M
# (896-dim, Qwen3-0.6B-Base backbone, last-token pooled + L2-normalized,
# code-specialized, with an ASYMMETRIC built-in query-instruct prompt)
# served via sentence-transformers (torch). Two roles:
# * DENSE-ONLY baseline for the structural-recall comparison — its graph
#   counterpart (repoqa_dense_graph_f2llm330m.yaml) uses the SAME embedder
#   block so the only difference measured is the graph_expand step.
# * The smaller sibling of repoqa_dense_f2llm.yaml (the 0.6B / 1024-dim
#   variant) — run both to isolate the model-size effect on dense
#   retrieval quality.
# See benchmarks/EXPERIMENTS.md.
embedding:
  provider: sentence_transformers
  model_name: codefuse-ai/F2LLM-v2-330M
  dim: 896
  batch_size: 8
  # Pin the token cap explicitly (the embedder default is also 2048, but
  # stating it keeps this config reproducible and apples-to-apples with the
  # other dense configs instead of relying on the implicit default).
  max_seq_length: 2048

pipelines:
  chunk:
    - default: true
      pipeline_path: pipelines/exp_dense.yaml
