# Experiment overlay — dense + graph_expand + centrality_prior, F2LLM-v2-330M.
# The dense-base counterpart of graph_hybrid_f2llm330m.yaml (identical
# graph treatment; the ONLY difference is dense vs RRF-hybrid seeding) and of
# dense_graph_f2llm330m.yaml (adds centrality_prior). node_scores enabled
# so centrality_prior has PageRank to rank by. See benchmarks/EXPERIMENTS.md.
embedding:
  provider: sentence_transformers
  model_name: codefuse-ai/F2LLM-v2-330M
  dim: 896
  batch_size: 8
  max_seq_length: 2048

reference_graph:
  node_scores:
    enabled: true

pipelines:
  chunk:
    - default: true
      pipeline_path: pipelines/exp_dense_graph_centrality.yaml
