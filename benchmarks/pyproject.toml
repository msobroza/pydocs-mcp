[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pyctx7-benchmarks"
version = "0.1.0"
description = "Benchmark suite for pydocs-mcp (RepoQA-SNF + MLflow)"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0",
    "httpx>=0.27",
    "rich>=13.0",
    "rapidfuzz>=3.0",
    # Plotting: pulled in here (not under an extra) so `plot_baselines`
    # works straight from `uv pip install -e benchmarks`. seaborn brings
    # matplotlib transitively, but pinning matplotlib explicitly keeps
    # the lower bound visible.
    "matplotlib>=3.7",
    "seaborn>=0.13",
]
# Note: pydocs-mcp is NOT a declared dependency. Install it separately
# from the project root (`uv pip install -e ".[dev]"`) before installing
# this package. The pre-PR `pydocs-mcp @ file://../` PEP 508 direct URL
# worked under `pip` (lenient about relative file URLs) but is rejected
# by `uv` (strict). Decoupling the install steps is the portable fix.

[project.optional-dependencies]
mlflow = ["mlflow>=2.0"]
# The skillopt optimizer adapter installs microsoft/SkillOpt from source (a research
# repo, not a PyPI wheel), pinned by full commit SHA so a version bump is a deliberate
# edit here — the adapter's _CONSUMED_SKILLOPT_SURFACE canary guards the API contract.
optimizers-skillopt = [
    "skillopt @ git+https://github.com/microsoft/SkillOpt@e4ea6a6771e797ef820cdd8bfea64c57e0481065",
]
all = [
    "mlflow>=2.0",
    "skillopt @ git+https://github.com/microsoft/SkillOpt@e4ea6a6771e797ef820cdd8bfea64c57e0481065",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["benchmarks*"]

# The usage_skill seed ships as package data so importlib.resources.files()
# resolves it in a built install, not just from the PYTHONPATH source tree.
[tool.setuptools.package-data]
"benchmarks.optimize.artifacts" = ["*.md"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
