[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pyctx7-benchmarks"
version = "0.1.0"
description = "Benchmark suite comparing pyctx7-mcp vs Context7"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pandas>=2.0",
    "httpx>=0.27",
    "rich>=13.0",
    "rapidfuzz>=3.0",
]
# Note: pydocs-mcp is NOT a declared dependency. Install it separately
# from the project root (`uv pip install -e ".[dev]"`) before installing
# this package. The pre-PR `pydocs-mcp @ file://../` PEP 508 direct URL
# worked under `pip` (lenient about relative file URLs) but is rejected
# by `uv` (strict). Decoupling the install steps is the portable fix.

[project.optional-dependencies]
mlflow = ["mlflow>=2.0"]
repoqa = ["datasets>=2.0", "huggingface-hub>=0.20"]
all = ["mlflow>=2.0", "datasets>=2.0", "huggingface-hub>=0.20"]

[project.scripts]
run-benchmarks = "benchmarks.runner:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["benchmarks*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
