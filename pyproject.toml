[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "pydocs-mcp"
version = "0.1.0"
description = "Local Python docs MCP server, accelerated with Rust"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = ["mcp>=1.0"]

[project.scripts]
pydocs-mcp = "pydocs_mcp.__main__:main"

[tool.maturin]
features = ["pyo3/extension-module"]
module-name = "pydocs_mcp._native"
python-source = "python"
