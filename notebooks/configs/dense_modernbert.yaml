# Method: single-stage DENSE retrieval with Alibaba-NLP/gte-modernbert-base
# (768-dim ModernBERT, general-purpose, long-context, symmetric) via
# sentence-transformers (torch).
#
# REQUIRES the extra:  pip install 'pydocs-mcp[sentence-transformers]'
# Because the embedder differs from bge-small, this method needs its OWN index
# (its own --cache-dir) — the stored vectors are not interchangeable.
embedding:
  provider: sentence_transformers
  model_name: Alibaba-NLP/gte-modernbert-base
  dim: 768
  batch_size: 16

pipelines:
  chunk:
    - default: true
      pipeline_path: pipelines/chunk_search_dense.yaml
