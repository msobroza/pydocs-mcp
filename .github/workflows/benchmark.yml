name: benchmark-repoqa

# WHY: only run on PRs touching code paths that can plausibly move retrieval
# quality. The benchmark sweep adds ~10 minutes to CI; gating on
# extraction/retrieval/defaults/benchmarks edits keeps unrelated PRs fast.
on:
  pull_request:
    paths:
      - 'python/pydocs_mcp/extraction/**'
      - 'python/pydocs_mcp/retrieval/**'
      - 'python/pydocs_mcp/defaults/**'
      - 'benchmarks/**'
      - '.github/workflows/benchmark.yml'

jobs:
  benchmark-repoqa:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # WHY: turbovec's compiled .so links against cblas_sgemm (CBLAS C-ABI).
      # Ubuntu's default libopenblas-dev provides only the Fortran ABI
      # (sgemm_). libopenblas-pthread-dev adds the CBLAS interface and the
      # update-alternatives selection makes the dynamic linker resolve it.
      - name: Install OpenBLAS with CBLAS interface (turbovec runtime dep)
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-pthread-dev liblapack-dev
          sudo update-alternatives --set libblas.so.3-x86_64-linux-gnu \
            /usr/lib/x86_64-linux-gnu/openblas-pthread/libblas.so.3 || true

      # WHY: prior fix attempts (libopenblas-dev, then libopenblas-pthread-dev
      # + update-alternatives) still failed with `undefined symbol: cblas_sgemm`
      # when turbovec/_turbovec.abi3.so was loaded. Diagnostic prints which
      # libopenblas variants are installed and which actually export the CBLAS
      # entry points — informs the LD_PRELOAD path on the runner step.
      # TODO: remove this diagnostic step once CI is reliably green.
      - name: Diagnose BLAS availability
        run: |
          echo "=== installed openblas pkgs ==="
          dpkg -l | grep -i openblas || echo "(no openblas pkgs)"
          echo "=== libopenblas .so files ==="
          find / -name 'libopenblas*' 2>/dev/null || true
          echo "=== cblas symbols in candidates ==="
          for so in $(find / -name 'libopenblas*.so*' 2>/dev/null); do
            if readelf -d "$so" >/dev/null 2>&1; then
              echo "--- $so ---"
              nm -D "$so" 2>/dev/null | grep -E "cblas_sgemm|sgemm" | head -3
            fi
          done
          echo "=== libblas alternatives ==="
          update-alternatives --display libblas.so.3-x86_64-linux-gnu 2>&1 || true

      - name: Install uv
        run: pip install uv

      # WHY: hybrid-search wired EmbedChunksStage into the shipped ingestion
      # pipeline by default, and the benchmark adapter calls build_embedder()
      # at index time. fastembed is a required runtime dep, so installing the
      # project pulls in the FastEmbed runtime. Dev deps moved to PEP 735
      # [dependency-groups] (P1-5) — uv's `--group dev` is the explicit path.
      - name: Install pydocs-mcp + dev deps
        run: |
          uv pip install --system -e .
          uv pip install --system --group dev

      - name: Install benchmarks + all extras
        run: uv pip install --system -e "benchmarks[all]"

      # WHY: cache HF datasets dir keyed on the loader file content so a
      # _PINNED_REVISION bump (or other loader edit) invalidates the cache.
      # Subsequent runs against the same revision skip the ~50 MB download.
      - name: Cache HF datasets
        uses: actions/cache@v4
        with:
          path: ~/.cache/pydocs-mcp/repoqa
          key: hf-repoqa-${{ hashFiles('benchmarks/src/pydocs_eval/datasets/repoqa.py') }}

      # WHY: CI runs against the bundled 5-task fixture (offline, reproducible)
      # rather than the full RepoQA HF dataset because _PINNED_REVISION is
      # still a placeholder. Switching to the real dataset is a one-line
      # change here once that pin lands. PYTHONPATH=benchmarks/src mirrors
      # scripts/run_repoqa.sh so the ``from pydocs_eval.X`` absolute
      # imports resolve under the PyPA src-layout.
      # WHY: LD_PRELOAD forces libopenblas.so.0 (CBLAS-enabled pthread variant)
      # to load before turbovec/_turbovec.abi3.so so cblas_sgemm resolves at
      # dlopen() time. The benchmark runner imports pydocs_mcp which pulls in
      # turbovec via the HybridSqliteTurboStore wiring path.
      - name: Run benchmark sweep against baseline.yaml
        env:
          LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libopenblas.so.0
        run: |
          mkdir -p benchmarks/results/ci
          PYTHONPATH=benchmarks/src python -m pydocs_eval.runner \
            --systems pydocs-mcp \
            --configs benchmarks/configs/baseline.yaml \
            --dataset repoqa \
            --fixture benchmarks/tests/fixtures/repoqa_mini.json \
            --trackers jsonl \
            --limit 5 \
          > benchmarks/results/ci/run.log

      # WHY: 2pp absolute threshold matches spec §4.12 / AC11. The bootstrap
      # CI band is wider than 2pp on a 5-task fixture, so we use a flat
      # percentage-point gate rather than CI-based detection — see
      # ci_compare.py for the rationale.
      #
      # CI compares fixture-vs-fixture (hermetic + reproducible): the sweep
      # above runs against repoqa_mini.json (5 needles), and the baseline
      # is repoqa_fixture_baseline.json captured from the same fixture. The
      # real-data record at repoqa_baselines/repoqa_snf.json is kept for
      # documentation only — comparing fixture results against the real
      # 100-needle baseline would diverge wildly on every PR.
      - name: Check recall@10 vs baseline
        env:
          LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libopenblas.so.0
        run: |
          PYTHONPATH=benchmarks/src python -m pydocs_eval.reporting.ci_compare \
            --baseline benchmarks/baselines/repoqa_fixture_baseline.json \
            --current 'benchmarks/results/jsonl/*.jsonl' \
            --metric recall@10 \
            --threshold 0.02

      - name: Upload JSONL run as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-jsonl
          path: benchmarks/results/jsonl/
