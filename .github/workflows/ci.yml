name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]          # full cross-platform matrix runs on a release tag
  pull_request:
  workflow_dispatch:       # manual trigger to run the full matrix on demand

jobs:
  # WHY: the per-platform × per-Python matrix is expensive (9 jobs) and the
  # platform-specific risk it guards — broken non-Linux wheels — only matters
  # when PUBLISHING. So PR / push-to-main run a single fast cell
  # (ubuntu-latest, 3.13); the full matrix runs only on a release tag (`v*`)
  # or a manual `workflow_dispatch`, i.e. before re-publishing the package.
  # This job emits the matrix the `python` job consumes via fromJSON.
  matrix-config:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.pick.outputs.include }}
    steps:
      - id: pick
        shell: bash
        # WHY env (not inline ${{ }}): github.ref is a ref NAME — quoting it
        # through an env var avoids any shell-injection via a crafted branch/
        # tag name (GitHub Actions hardening guidance).
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [[ "$REF" == refs/tags/* ]]; then
            echo 'include=[{"os":"ubuntu-latest","python-version":"3.11"},{"os":"ubuntu-latest","python-version":"3.12"},{"os":"ubuntu-latest","python-version":"3.13"},{"os":"macos-14","python-version":"3.11"},{"os":"macos-14","python-version":"3.12"},{"os":"macos-14","python-version":"3.13"},{"os":"windows-latest","python-version":"3.11"},{"os":"windows-latest","python-version":"3.12"},{"os":"windows-latest","python-version":"3.13"}]' >> "$GITHUB_OUTPUT"
          else
            echo 'include=[{"os":"ubuntu-latest","python-version":"3.13"}]' >> "$GITHUB_OUTPUT"
          fi

  python:
    needs: matrix-config
    runs-on: ${{ matrix.os }}
    # WHY: fail-fast: false so each OS row reports independently. The matrix is
    # chosen by the `matrix-config` job above — a single cell for PR/merge, the
    # full OS × Python grid (mirroring release.yml's wheel targets) on a release
    # tag or workflow_dispatch. Some tests may need @pytest.mark.skipif when
    # macOS / Windows surface POSIX-only behavior — prefer per-test skips over
    # dropping OS rows.
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix-config.outputs.include) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # WHY: turbovec's compiled .so links against cblas_sgemm (CBLAS C-ABI).
      # Ubuntu's default libopenblas-dev provides only the Fortran ABI
      # (sgemm_). libopenblas-pthread-dev adds the CBLAS interface and the
      # update-alternatives selection makes the dynamic linker resolve it.
      # macOS ships CBLAS via Accelerate; Windows via the MSVC runtime.
      - name: Install OpenBLAS with CBLAS interface (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-pthread-dev liblapack-dev
          sudo update-alternatives --set libblas.so.3-x86_64-linux-gnu \
            /usr/lib/x86_64-linux-gnu/openblas-pthread/libblas.so.3 || true

      # WHY: prior fix attempts (libopenblas-dev, then libopenblas-pthread-dev
      # + update-alternatives) still failed with `undefined symbol: cblas_sgemm`
      # when turbovec/_turbovec.abi3.so was loaded. Diagnostic prints which
      # libopenblas variants are installed and which actually export the CBLAS
      # entry points — informs the LD_PRELOAD path on the next step.
      # TODO: remove this diagnostic step once CI is reliably green.
      - name: Diagnose BLAS availability (Linux only)
        if: runner.os == 'Linux'
        run: |
          echo "=== installed openblas pkgs ==="
          dpkg -l | grep -i openblas || echo "(no openblas pkgs)"
          echo "=== libopenblas .so files ==="
          find / -name 'libopenblas*' 2>/dev/null || true
          echo "=== cblas symbols in candidates ==="
          for so in $(find / -name 'libopenblas*.so*' 2>/dev/null); do
            if readelf -d "$so" >/dev/null 2>&1; then
              echo "--- $so ---"
              nm -D "$so" 2>/dev/null | grep -E "cblas_sgemm|sgemm" | head -3
            fi
          done
          echo "=== libblas alternatives ==="
          update-alternatives --display libblas.so.3-x86_64-linux-gnu 2>&1 || true

      # WHY: dev deps moved to PEP 735 [dependency-groups] so they stay
      # out of wheel METADATA. `--group dev` requires uv or pip >= 25.1 —
      # uv is the established install path in release.yml.
      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # WHY: `uv sync --frozen` installs into a managed .venv directly
      # from uv.lock, refusing to re-resolve. Previously the two
      # `uv pip install --system` calls resolved fresh against PyPI on
      # every run — uv.lock existed but did not gate anything, so a
      # transitive patch release could redden CI silently. Subsequent
      # CI commands wrap through `uv run` so they pick up the venv
      # without an explicit `source .venv/bin/activate` step.
      - name: Install project + dev group (frozen)
        run: uv sync --frozen --group dev

      - name: Lint
        run: uv run ruff check python/ tests/

      - name: Format check
        run: uv run ruff format --check python/ tests/ benchmarks/

      # WHY: 74% of files in python/pydocs_mcp/ carry type hints. With py.typed
      # shipped, mypy must verify the annotations are coherent for downstream
      # consumers. Lenient initial baseline (see [tool.mypy] in pyproject.toml);
      # ratchet plan is to flip disallow_untyped_defs=true in a follow-up PR.
      - name: Typecheck
        run: uv run mypy python/pydocs_mcp

      # WHY: cognitive-complexity gate. Ceiling 15, enforced against the
      # committed complexipy-snapshot.json baseline so the existing offenders
      # don't redden CI — only a NEW or WORSENED function (newly over 15, or an
      # already-over function that regresses further) fails. The snapshot-
      # comparison run exits 1 on such regressions. Burn the baseline down,
      # then lower the ceiling. See [tool.complexipy].
      # PYTHONIOENCODING: complexipy prints ✅/🎉 emoji; Windows' default
      # cp1252 console codec can't encode them, crashing the step with a
      # UnicodeEncodeError unrelated to any complexity finding. Force UTF-8
      # stdout so the gate reports findings, not codec errors.
      - name: Complexity gate (complexipy)
        env:
          PYTHONIOENCODING: "utf-8"
        run: uv run complexipy python/pydocs_mcp --max-complexity-allowed 15

      # WHY: dead-code gate. The [tool.vulture] whitelist (ignore_names /
      # ignore_decorators) pre-suppresses the 4 known false positives
      # (_fast.py substitution-boundary re-exports + pydantic-settings hook
      # params), so a min-confidence-80 run is clean. vulture reads the
      # pyproject [tool.vulture] section automatically.
      - name: Dead-code gate (vulture)
        env:
          PYTHONIOENCODING: "utf-8"
        run: uv run vulture python/pydocs_mcp --min-confidence 80

      - name: Smoke-test out-of-tree pydocs_mcp imports
        # benchmarks/ is not under tests/, so a rename to an internal
        # pydocs_mcp module (e.g. storage/wiring.py -> storage/factories.py)
        # silently breaks it. AST-level scan resolves every `pydocs_mcp.*`
        # import declared by the three benchmark entry files, *without*
        # executing their top-level code (pandas/httpx/rich aren't installed
        # in this job). Catches stale module paths + missing attributes.
        run: uv run python scripts/smoke_check_benchmark_imports.py

      # WHY: LD_PRELOAD forces the dynamic linker to load libopenblas.so.0
      # (CBLAS-enabled pthread variant) BEFORE turbovec/_turbovec.abi3.so
      # is dlopen()'d by the Python `import turbovec` call, so cblas_sgemm
      # is resolvable at .so-load time. update-alternatives selects a
      # provider for libblas.so.3 callers but does not affect the bare
      # libopenblas.so.0 SONAME that turbovec hard-codes via -lopenblas at
      # link time. The diagnostic step above prints the actual path if the
      # canonical /usr/lib/x86_64-linux-gnu/libopenblas.so.0 doesn't exist.
      # macOS / Windows resolve CBLAS via Accelerate / MSVC runtime, so no
      # LD_PRELOAD is needed (and the env var itself is Linux-only).
      - name: Test with coverage (Linux)
        if: runner.os == 'Linux'
        env:
          LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libopenblas.so.0
        run: |
          uv run python -m pytest tests/ -v \
            --ignore=tests/test_parity.py \
            --cov=pydocs_mcp \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=90

      - name: Test with coverage (macOS / Windows)
        if: runner.os != 'Linux'
        run: |
          uv run python -m pytest tests/ -v --ignore=tests/test_parity.py --cov=pydocs_mcp --cov-report=term-missing --cov-fail-under=90

      - name: Upload coverage artifact
        # WHY: only one upload per run — pin to the Linux + 3.13 cell, which
        # is the single cell that ALWAYS runs (PR/merge light matrix + every
        # full-matrix expansion), so the artifact is produced exactly once.
        if: runner.os == 'Linux' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # WHY: turbovec's compiled .so links against cblas_sgemm (CBLAS C-ABI).
      # Ubuntu's default libopenblas-dev provides only the Fortran ABI
      # (sgemm_). libopenblas-pthread-dev adds the CBLAS interface and the
      # update-alternatives selection makes the dynamic linker resolve it.
      - name: Install OpenBLAS with CBLAS interface (turbovec runtime dep)
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-pthread-dev liblapack-dev
          sudo update-alternatives --set libblas.so.3-x86_64-linux-gnu \
            /usr/lib/x86_64-linux-gnu/openblas-pthread/libblas.so.3 || true

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          # WHY: maturin >= 1.7 internally calls `pip install --group` when
          # the project has a [dependency-groups] table (PEP 735). That
          # requires pip >= 25.1 — older pip in the runner default venv
          # fails with "no such option: --group". Upgrade before installing
          # maturin so the build step doesn't trip on a stale resolver.
          pip install --upgrade pip
          pip install maturin pytest

      - name: Rust format check
        run: cargo fmt --check

      - name: Rust lint
        run: cargo clippy -- -D warnings

      - name: Rust tests
        run: cargo test

      # WHY: LD_PRELOAD forces libopenblas.so.0 (CBLAS-enabled pthread variant)
      # to load before turbovec/_turbovec.abi3.so so cblas_sgemm resolves at
      # dlopen() time. Same rationale as the python job's pytest step.
      - name: Build with maturin + parity tests
        env:
          LD_PRELOAD: /usr/lib/x86_64-linux-gnu/libopenblas.so.0
        run: |
          source .venv/bin/activate
          maturin develop --release
          python -m pytest tests/test_parity.py -v

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      # WHY: two-step `uv export` -> `uvx pip-audit` avoids bash process
      # substitution so the job would Windows-port cleanly if we ever
      # cross-OS it. `--no-emit-project` keeps the auditor focused on
      # third-party advisories (the project itself isn't published on PyPI
      # during CI — it would be self-referential).
      - name: Export locked deps
        run: uv export --frozen --no-emit-project --no-group docs --format requirements-txt > requirements-audit.txt

      # WHY: --strict makes the only passing outcome "no advisories found";
      # advisories on transitive deps also fail. If pip-audit reports a CVE,
      # the fix is either a dep bump or `--ignore-vuln <GHSA-...>` with an
      # inline WHY explaining why the advisory doesn't materially affect us.
      - name: pip-audit
        run: uvx pip-audit --strict --requirement requirements-audit.txt
