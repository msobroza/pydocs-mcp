# Shipped defaults — loaded as the lowest-priority AppConfig layer (spec §5.9).
# User pydocs-mcp.yaml overrides any key; env vars override YAML; CLI flags win.
cache_dir: ~/.pydocs-mcp
log_level: info

metadata_schemas:
  chunk:  [package, scope, origin, title, module]
  member: [package, scope, module, name, kind]

pipelines:
  chunk:
    # scope=deps queries route to the BM25 ∥ dense-doc-pages preset (dependency
    # code is FTS-indexed but vectorless under embedding.dependency_policy:
    # doc_pages, so pure dense would miss it). Everything else stays on the
    # benchmarked dense + graph default — which also covers dependency doc
    # pages semantically, since those ARE embedded.
    - predicate: scope_is_dependencies_only
      pipeline_path: pipelines/chunk_search_deps.yaml
    - default: true
      pipeline_path: pipelines/chunk_search_graph.yaml
  member:
    - default: true
      pipeline_path: pipelines/member_search.yaml

extraction:
  # Directory blocklist is hardcoded in extraction/config.py::_EXCLUDED_DIRS —
  # not configurable via YAML by design (security: un-excluded .git/.venv/
  # site-packages would leak secrets). Extension allowlist IS narrowable.
  chunking:
    # Chunker selection is decorator-driven (see chunker_registry); the
    # by_extension YAML field was dead config and got removed
    # (/ultrareview F11). Adding a new extension means registering a
    # new chunker, not editing this file.
    markdown:
      min_heading_level: 1
      max_heading_level: 3
    notebook:
      include_outputs: false
  discovery:
    project:
      include_extensions: [".py", ".md", ".ipynb"]
      max_file_size_bytes: 1000000
    dependency:
      include_extensions: [".py", ".md", ".ipynb"]
      max_file_size_bytes: 1000000
  members:
    # Per-module symbol cap + per-field truncation. Increase if you
    # index huge dependencies (large ML libs); decrease to bound FTS
    # row size. All ge=1 — config-time validation rejects 0/negative.
    inspect_depth: 1
    members_per_module_cap: 120
    signature_max_chars: 200
    docstring_max_chars: 1024
  ingestion:
    pipeline_path: null

reference_graph:
  capture:
    enabled: true
    kinds: [calls, imports, inherits]   # add 'mentions' to opt in
  output:
    default_limit: 50
    max_limit: 1000
  resolver:                                 # sub-PR follow-up to #5c
    include_stdlib: true                    # merges bundled stdlib_qnames.json into universe
    strict_suffix: true                     # ablation knob — see ReferenceResolverConfig
  node_scores:
    enabled: false                          # index-time PageRank/community/in-degree; needs pip install 'pydocs-mcp[graph]'
  similar_edges:
    enabled: false                          # synthetic embedding-kNN 'similar' edges (densify the graph)
    top_m: 5                                # neighbours per node when enabled (1-25)
  impact:
    max_depth: 3                            # reverse-traversal depth for lookup(show="impact"), 1-6
  context:
    max_depth: 2                            # forward dependency-closure depth for lookup(show="context"), 1-6
    token_budget: 2048                      # token cap for the packed context (graded fidelity)

search:
  output:
    default_limit: 10
    max_limit: 1000

symbol_source:
  max_lines: 400            # get_symbol(depth="source") bound (spec §D7)

# Response conventions (spec §D4/§D5): the freshness envelope line and
# per-hit next-step pointers on every search/lookup response. Disable
# envelope for byte-stable golden pipelines; disable next_pointers to
# restore pre-envelope output bytes exactly.
output:
  envelope:
    enabled: true
    head_check_ttl_seconds: 5
  next_pointers:
    enabled: true

overview:                     # get_overview card caps (spec §D17)
  max_modules: 20
  max_communities: 10

# File-watcher tunables for `pydocs-mcp serve --watch` (CLI flag overrides
# `enabled` — leave it false here so plain `pydocs-mcp serve` is identical
# to today). Debounce naturally collapses editor atomic-save sequences
# (temp create → delete → rename → 1 reindex). Ignore globs default-skip
# the high-churn paths that would otherwise produce false-positive
# reindexes. Requires `pip install pydocs-mcp[watch]`.
serve:
  watch:
    enabled: false
    debounce_ms: 500
    extensions: [".py", ".md", ".ipynb"]
    ignore_globs:
      - "**/__pycache__/**"
      - "**/.git/**"
      - "**/.venv/**"
      - "**/node_modules/**"
      - "**/.pytest_cache/**"
      - "**/*.pyc"

# Embedding + vector-quantization (spec §5.10).
embedding:
  provider:    fastembed
  model_name:  BAAI/bge-small-en-v1.5
  dim:         384
  batch_size:  32
  bit_width:   4
  # Embedder execution device (cpu / cuda); the --gpu CLI flag sets cuda.
  #   device:    cpu
  # sentence_transformers-only: inference runtime + quantized weight file.
  # Setting either re-embeds on the next index (they change the vectors).
  #   backend:         openvino   # torch (default) | onnx | openvino
  #   model_file_name: openvino/openvino_model_qint8_quantized.xml
  # Which DEPENDENCY chunks get dense vectors (everything stays BM25-indexed):
  #   doc_pages (default) — per-module docstring pages + markdown/README only
  #   full                — every dependency chunk (slow on torch-sized deps)
  #   none                — dependencies are BM25-only
  dependency_policy: doc_pages
  # Dependencies promoted to the project-grade full tier (names or fnmatch
  # globs); the CLI --full-dep flag merges into this list.
  full_index_dependencies: []

# Airgap / offline: set model_name to a LOCAL DIRECTORY of side-loaded
# weights and nothing is ever downloaded (HF offline is forced). For
# provider: fastembed also state the model's recipe — fastembed cannot
# read it from an arbitrary ONNX folder:
#
#   embedding:
#     provider: fastembed
#     model_name: /opt/models/bge-small-en-v1.5
#     dim: 384
#     pooling: mean            # mean | cls | disabled — MUST match the model
#     normalize: true
#     model_file_name: onnx/model.onnx
#
# provider: sentence_transformers reads pooling/prompts from the model dir
# itself — the right choice for last-token models like Qwen3-Embedding
# (fastembed has no last-token pooling):
#
#   embedding:
#     provider: sentence_transformers
#     model_name: /opt/models/Qwen3-Embedding-0.6B
#     dim: 1024
#
# provider: openai rejects a local path (remote API).

# Unified SearchBackend seam (spec §8.1): which storage backend serves
# retrieval capabilities. `dim` / `bit_width` stay sourced from `embedding`
# above (single source of truth) — do NOT duplicate them here.
search_backend:
  kind: sqlite_composite

# LLM client configuration — used by LlmTreeReasoningStep and other
# LLM-driven retrieval primitives. Defaults to OpenAI's gpt-4o-mini.
# OPENAI_API_KEY env var is the credential source.
#
# Uncomment to override:
# llm:
#   provider: openai
#   model_name: gpt-4o-mini
#   temperature: 0.0
#   max_tokens: 1024

# Late-interaction (ColBERT / PyLate) embedder — sibling of `embedding` /
# `llm`. Opt-in (enabled=false by default); when enabled, consumed by
# `build_multi_vector_embedder(cfg)` (lazy pylate import) and folded into
# `ingestion_pipeline_hash` when the active ingestion pipeline references
# `embed_chunks_multi_vector`. Per CLAUDE.md §"MCP API surface vs YAML
# configuration": late-interaction tuning is a pipeline knob, NOT an MCP
# tool param — the MCP surface stays fixed.
#
# Uncomment to override:
# late_interaction:
#   enabled: false
#   provider: pylate
#   model_name: lightonai/LateOn-Code
#   embedding_dim: 128
#   document_length: 180
#   query_length: 32
#   pool_factor: 1
#   device: cpu
