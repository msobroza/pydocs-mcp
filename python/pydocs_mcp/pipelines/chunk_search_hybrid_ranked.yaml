# Ranked hybrid chunk-search pipeline — benchmark / evaluation use only.
#
# Identical to chunk_search_hybrid.yaml but drops the final
# token_budget_formatter step so the pipeline returns top-K SEPARATE
# ranked chunks in state.candidates (post-fusion) instead of one
# composite chunk in state.result. recall@k / mrr / pass@1 metrics can
# actually measure top-K hits with this preset; the MCP server keeps
# chunk_search.yaml (BM25 composite) as its default.
#
# Production note: pointing DocsSearch (MCP `search` handler) at this
# preset is supported — DocsSearch.search reads state.candidates when
# state.result is None — but the composite / budgeted output of the
# composite variants is what LLM clients typically want. Use this
# preset for benchmark sweeps + offline evaluation, not as the live
# MCP default.
#
# dense_scorer runs POST-FUSION (after rrf_fusion, before limit) — see
# chunk_search_hybrid.yaml for the full rationale.
name: chunk_search_hybrid_ranked
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: parallel
    type: parallel_retrieval
    params:
      branches:
        - name: bm25
          steps:
            - name: fetch
              type: chunk_fetcher
              params:
                schema_name: chunk
            - name: score
              type: bm25_scorer
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params:
                publish_to: bm25.ranked
        - name: dense
          steps:
            - name: fetch
              type: dense_fetcher
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params:
                publish_to: dense.ranked
  - name: fuse
    type: rrf_fusion
    params: {}
  - name: dense_rerank
    type: dense_scorer
    params: {}
  - name: limit
    type: limit
    params:
      max_results: 8
  # NO token_budget_formatter — output is state.candidates (post-fusion
  # ranked list), not state.result (composite). Benchmark adapter
  # prefers state.candidates.
