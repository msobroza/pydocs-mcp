# Dense-only chunk-search retrieval pipeline (spec §5.8, AC-21).
#
# Single-branch counterpart to chunk_search.yaml: replaces the BM25
# (FTS5 MATCH) candidate generator with a dense (vector-search) fetcher
# backed by TurboQuantVectorStore. The downstream chain — metadata
# post-filter, top-K cutoff, limit cap, composite token-budget render
# — is identical to chunk_search.yaml.
#
# Steps:
#   1. pre_filter           — parse + validate + scope-split, write typed
#                             PreFilterResult to state.scratch
#   2. dense_fetcher        — embed query, ANN search with metadata-filtered
#                             candidate allowlist; stamps the ANN index
#                             score as relevance on state.candidates
#   3. metadata_post_filter — apply SearchQuery.post_filter in-memory
#   4. top_k_filter         — sort by relevance desc, keep top K
#   5. limit                — cap final item count (legacy AC parity)
#   6. token_budget_formatter — render the composite chunk for MCP output
#
# No dense_scorer here: dense_fetcher's ANN index score IS the turbovec
# score (dense_scorer would re-score the identical single-branch candidate
# set from the same index and produce the same numbers — pure redundancy
# in a pure-dense pipeline with nothing to fuse against). dense_scorer's
# job is POST-FUSION re-ranking of a merged BM25+dense candidate set — see
# chunk_search_hybrid.yaml.
#
# Requires BuildContext.embedder + BuildContext.vector_store at load
# time (DenseFetcherStep raises on None). Provided by
# build_retrieval_context(...) when the server / CLI boots with the
# embedder + TurboQuant store configured.
name: chunk_search_dense
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: fetch
    type: dense_fetcher
    params: {}
  - name: filter
    type: metadata_post_filter
    params: {}
  - name: topk
    type: top_k_filter
    params: {}
  - name: limit
    type: limit
    params:
      max_results: 8
  - name: budget
    type: token_budget_formatter
    params:
      formatter: {type: chunk_markdown}
      budget: 2000
