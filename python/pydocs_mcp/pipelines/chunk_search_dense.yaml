# Dense-only chunk-search retrieval pipeline (spec §5.8, AC-21).
#
# Single-branch counterpart to chunk_search.yaml: replaces the BM25
# (FTS5 MATCH) candidate generator with a dense (vector-search) fetcher
# backed by TurboQuantVectorStore. The downstream chain — metadata
# post-filter, top-K cutoff, limit cap, composite token-budget render
# — is identical to chunk_search.yaml.
#
# Steps:
#   1. pre_filter           — parse + validate + scope-split, write typed
#                             PreFilterResult to state.scratch
#   2. dense_fetcher        — embed query, ANN search with metadata-filtered
#                             candidate allowlist; writes state.candidates
#   3. dense_scorer         — overwrite relevance with cosine sim (the
#                             fetcher's ANN index score is approximate;
#                             the scorer's exact cosine sim is what
#                             downstream RRF / top-K should rank on)
#   4. metadata_post_filter — apply SearchQuery.post_filter in-memory
#   5. top_k_filter         — sort by relevance desc, keep top K
#   6. limit                — cap final item count (legacy AC parity)
#   7. token_budget_formatter — render the composite chunk for MCP output
#
# Requires BuildContext.embedder + BuildContext.vector_store at load
# time (DenseFetcherStep / DenseScorerStep raise on None). Provided by
# build_retrieval_context(...) when the server / CLI boots with the
# embedder + TurboQuant store configured.
name: chunk_search_dense
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: fetch
    type: dense_fetcher
    params: {}
  - name: score
    type: dense_scorer
    params: {}
  - name: filter
    type: metadata_post_filter
    params: {}
  - name: topk
    type: top_k_filter
    params: {}
  - name: limit
    type: limit
    params:
      max_results: 8
  - name: budget
    type: token_budget_formatter
    params:
      formatter: {type: chunk_markdown}
      budget: 2000
