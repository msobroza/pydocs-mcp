# Hybrid chunk-search retrieval pipeline — BM25 + Dense fused via RRF (spec §5.8, AC-21).
#
# Combines the lexical strengths of BM25 (FTS5 MATCH) with the semantic
# strengths of dense vector search via reciprocal-rank fusion (Cormack
# et al. 2009 — arXiv:0908.3287). The pre_filter step runs ONCE at the
# top of the pipeline so both branches consume the same parsed +
# scope-split filter tree; each branch then independently fetches,
# scores, post-filters, and top-Ks its own candidates and publishes the
# ranked list to state.scratch via TopKFilterStep.publish_to. The
# downstream rrf_fusion step reads "bm25.ranked" and "dense.ranked"
# from scratch (RRFFusionStep's shipped default branch_keys), fuses
# them, and writes the fused ranking to state.candidates for the final
# limit + composite render.
#
# Pipeline shape:
#
#   pre_filter
#     │
#     parallel_retrieval
#     ├── branch bm25:  fetch (FTS5) → score (bm25)   → filter → topk (→ scratch[bm25.ranked])
#     └── branch dense: fetch (ANN)  → score (cosine) → filter → topk (→ scratch[dense.ranked])
#     │
#   rrf_fusion (reads scratch[bm25.ranked] + scratch[dense.ranked]; writes state.candidates)
#     │
#   limit (cap final item count for AC parity)
#     │
#   token_budget_formatter (composite render for MCP output)
#
# Requires BuildContext.embedder + BuildContext.vector_store at load
# time for the dense branch (DenseFetcherStep / DenseScorerStep raise
# on None). Provided by build_retrieval_context(...) when the server /
# CLI boots with the embedder + TurboQuant store configured.
name: chunk_search_hybrid
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: parallel
    type: parallel_retrieval
    params:
      branches:
        - name: bm25
          steps:
            - name: fetch
              type: chunk_fetcher
              params:
                schema_name: chunk
            - name: score
              type: bm25_scorer
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params:
                publish_to: bm25.ranked
        - name: dense
          steps:
            - name: fetch
              type: dense_fetcher
              params: {}
            - name: score
              type: dense_scorer
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params:
                publish_to: dense.ranked
  - name: fuse
    type: rrf_fusion
    params: {}
  - name: limit
    type: limit
    params:
      max_results: 8
  - name: budget
    type: token_budget_formatter
    params:
      formatter: {type: chunk_markdown}
      budget: 2000
