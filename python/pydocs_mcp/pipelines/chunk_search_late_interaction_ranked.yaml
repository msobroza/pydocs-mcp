# Late-interaction chunk-search pipeline — benchmark / evaluation variant.
#
# Identical to ``chunk_search_late_interaction.yaml`` but drops the final
# ``token_budget_formatter`` step so the pipeline returns top-K SEPARATE
# ranked chunks in ``state.candidates`` (post-RRF) instead of one
# composite chunk in ``state.result``. recall@k / mrr / pass@1 metrics
# can actually measure top-K hits with this preset; the MCP server keeps
# the composite variant as its user-facing default.
#
# Production note: pointing ``DocsSearch`` (MCP ``search`` handler) at
# this preset is supported — ``DocsSearch.search`` reads
# ``state.candidates`` when ``state.result`` is None — but the composite
# / budgeted output of ``chunk_search_late_interaction.yaml`` is what
# LLM clients typically want. Use this preset for benchmark sweeps +
# offline evaluation, not as the live MCP default.
name: chunk_search_late_interaction_ranked
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: parallel
    type: parallel_retrieval
    params:
      branches:
        - name: bm25
          steps:
            - name: fetch
              type: chunk_fetcher
              params:
                schema_name: chunk
            - name: score
              type: bm25_scorer
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params:
                publish_to: bm25.ranked
        - name: late
          steps:
            - name: fetch
              type: chunk_fetcher
              params:
                schema_name: chunk
            - name: score
              type: bm25_scorer
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params: {}
            - name: rerank
              type: late_interaction_scorer
              params:
                publish_to: late.ranked
  - name: fuse
    type: rrf_fusion
    params: {}
  - name: limit
    type: limit
    params:
      max_results: 8
  # No composite render — output is state.candidates (post-fusion ranked
  # list), not state.result. Benchmark adapter prefers state.candidates.
