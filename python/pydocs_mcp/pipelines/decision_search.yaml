# Decision-scope chunk search — BM25 over mined decision-record chunks ∥ dense
# over their embeddings, fused via RRF.
#
# search_codebase(kind="decision") stamps the decision-record origin pushdown
# (build_search_query), and the shipped default config routes such queries here
# via the kind_is_decision predicate. The origin pre-filter scopes both branches
# to origin="decision_record" chunks so keyword and semantic signals fuse over
# recorded design rationale — get_why is the richer, structured entry point.
#
# Shape mirrors chunk_search_deps.yaml:
#   pre_filter → parallel [bm25 → topk] [dense → topk] → rrf_fusion → limit → budget
name: decision_search
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: parallel
    type: parallel_retrieval
    params:
      branches:
        - name: bm25
          steps:
            - name: fetch
              type: chunk_fetcher
              params:
                schema_name: chunk
            - name: score
              type: bm25_scorer
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params:
                publish_to: bm25.ranked
        - name: dense
          steps:
            - name: fetch
              type: dense_fetcher
              params: {}
            - name: score
              type: dense_scorer
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params:
                publish_to: dense.ranked
  - name: fuse
    type: rrf_fusion
    params: {}
  - name: limit
    type: limit
    params:
      max_results: 8
  - name: budget
    type: token_budget_formatter
    params:
      formatter: {type: chunk_markdown}
      budget: 2000
