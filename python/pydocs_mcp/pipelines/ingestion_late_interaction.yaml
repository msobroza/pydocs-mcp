# Late-interaction ingestion pipeline.
#
# Drop-in replacement for ``ingestion.yaml`` when
# ``late_interaction.enabled: true`` in the active AppConfig YAML. Exactly
# two deltas from the default preset:
#
# - ``embed_chunks`` is swapped for ``embed_chunks_multi_vector`` so the
#   configured ``MultiVectorEmbedder`` populates ``uow.multi_vectors``
#   (the fast-plaid-backed multi-vector store) during indexing.
# - ``synthesize_similar_edges`` is omitted: that stage reads only
#   single-vector embeddings (it skips multi-vector chunks), so it would
#   be inert in a preset where every embedded chunk is multi-vector.
#
# Every other stage — file discovery, chunking, reference capture,
# decision capture, dependency doc pages, content-hash rewrite + skip
# set, package_build — is identical to the default ingestion preset
# (tests/pipelines/test_late_interaction_yaml_round_trip.py enforces the
# parity).
#
# Override via ``extraction.ingestion.pipeline_path`` in your config YAML;
# the loader resolves the path against the shipped pipelines dir or the
# directory next to the config file (path allowlist contract).
name: ingestion_late_interaction
stages:
  - { type: file_discovery }
  - { type: file_read }
  - { type: chunking }
  - { type: reference_capture }
  - { type: flatten }
  - { type: capture_decisions }            # project only: mine + merge decisions → decision-as-chunks (spec §D8)
  - { type: dependency_doc_pages }         # deps only: 1 docstring page per module (the embedded doc unit)
  - { type: assign_chunk_content_hash }    # rewrites chunk hashes with pipeline_hash slot
  - { type: load_existing_chunk_hashes }   # reads SQLite for the embed-skip set
  - { type: embed_chunks_multi_vector, batch_size: 32 }
  - { type: content_hash }
  - { type: package_build }
