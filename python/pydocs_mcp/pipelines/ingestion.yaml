# Default ingestion pipeline (sub-PR #5 — spec §7.3).
#
# SINGLE pipeline handles both project and dependency modes; file_discovery
# and package_build branch on state.files.target_kind internally. Override
# via extraction.ingestion.pipeline_path in your pydocs-mcp config YAML —
# user-provided paths must resolve inside the shipped pipelines dir or next
# to the config file (sub-PR #2 path allowlist, AC #33).
name: ingestion
stages:
  - { type: file_discovery }
  - { type: file_read }
  - { type: chunking }
  - { type: reference_capture }
  - { type: flatten }
  - { type: assign_chunk_content_hash }    # rewrites chunk hashes with pipeline_hash slot
  - { type: load_existing_chunk_hashes }   # reads SQLite for the embed-skip set
  - { type: embed_chunks, batch_size: 32 }
  - { type: synthesize_similar_edges }     # opt-in kNN 'similar' edges (needs embeddings; no-op unless enabled)
  - { type: content_hash }
  - { type: package_build }
