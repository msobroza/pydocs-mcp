# Late-interaction chunk-search retrieval pipeline — BM25 + MaxSim re-ranking.
#
# Combines BM25 (FTS5 MATCH) candidate generation with multi-vector
# late-interaction (ColBERT-style MaxSim) re-ranking. Both branches share
# the same ``pre_filter`` parse + scope-split, then run in parallel:
#
#   pre_filter
#     │
#     parallel_retrieval
#     ├── branch bm25:  fetch (FTS5) → score (bm25)           → filter → topk (→ scratch[bm25.ranked])
#     └── branch late:  fetch (FTS5) → score (bm25)           → filter → topk
#                       → late_interaction_scorer (MaxSim re-rank, → scratch[late.ranked])
#     │
#   rrf_fusion (reads scratch[bm25.ranked] + scratch[late.ranked]; writes state.candidates)
#     │
#   limit (cap final item count)
#     │
#   token_budget_formatter (composite render for MCP output)
#
# WHY two BM25-seeded branches: ``late_interaction_scorer`` is a pure
# scorer — it re-ranks an upstream candidate set, it does not fetch.
# The ``late`` branch reuses BM25 as the candidate generator and then
# re-scores via MaxSim against the multi-vector store. RRF fusion of the
# two branch rankings recovers BM25's lexical recall while letting
# late-interaction sharpen the top of the list.
#
# Requires ``BuildContext.multi_vector_embedder`` + ``BuildContext.uow_factory``
# at load time (``LateInteractionScorerStep.from_dict`` raises on None).
# Provided by ``build_retrieval_context(...)`` when the server / CLI
# boots with ``late_interaction.enabled: true`` in the active config.
name: chunk_search_late_interaction
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: parallel
    type: parallel_retrieval
    params:
      branches:
        - name: bm25
          steps:
            - name: fetch
              type: chunk_fetcher
              params:
                schema_name: chunk
            - name: score
              type: bm25_scorer
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params:
                publish_to: bm25.ranked
        - name: late
          steps:
            - name: fetch
              type: chunk_fetcher
              params:
                schema_name: chunk
            - name: score
              type: bm25_scorer
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params: {}
            - name: rerank
              type: late_interaction_scorer
              params:
                publish_to: late.ranked
  - name: fuse
    type: rrf_fusion
    params: {}
  - name: limit
    type: limit
    params:
      max_results: 8
  - name: budget
    type: token_budget_formatter
    params:
      formatter: {type: chunk_markdown}
      budget: 2000
