# Dependency-scope chunk search — BM25 over ALL dep chunks ∥ dense over their
# embedded doc pages, fused via RRF.
#
# Under the default selective embed policy (embedding.dependency_policy:
# doc_pages) a dependency's CODE chunks are FTS-indexed but vectorless, while
# its documentation (per-module docstring pages, markdown, READMEs) carries
# dense vectors. This preset pairs the two signals: the BM25 branch reaches
# every dependency chunk by keyword; the dense branch reaches the docs by
# meaning (vectorless code ids are simply absent from the ANN result — no
# error). The shipped default config routes scope=deps queries here via the
# scope_is_dependencies_only predicate; project / all-scope queries stay on
# the dense+graph default (chunk_search_graph.yaml).
#
# Shape mirrors chunk_search_hybrid.yaml:
#   pre_filter → parallel [bm25 → topk] [dense → topk] → rrf_fusion →
#   dense_scorer (post-fusion re-rank) → limit → budget
name: chunk_search_deps
steps:
  - name: pre_filter
    type: pre_filter
    params:
      schema_name: chunk
      target_field: chunk
  - name: parallel
    type: parallel_retrieval
    params:
      branches:
        - name: bm25
          steps:
            - name: fetch
              type: chunk_fetcher
              params:
                schema_name: chunk
            - name: score
              type: bm25_scorer
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params:
                publish_to: bm25.ranked
        - name: dense
          steps:
            - name: fetch
              type: dense_fetcher
              params: {}
            - name: filter
              type: metadata_post_filter
              params: {}
            - name: topk
              type: top_k_filter
              params:
                publish_to: dense.ranked
  - name: fuse
    type: rrf_fusion
    params: {}
  - name: dense_rerank
    type: dense_scorer
    params: {}
  - name: limit
    type: limit
    params:
      max_results: 8
  - name: budget
    type: token_budget_formatter
    params:
      formatter: {type: chunk_markdown}
      budget: 2000
